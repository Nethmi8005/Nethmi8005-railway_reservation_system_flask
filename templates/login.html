<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Railway Reservation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <video class="video-background" autoplay loop muted>
        <source src="{{ url_for('static', filename='videos/train.mp4') }}" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="container1">
        <h1>Login</h1>
        <form method="POST">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Login</button>
        </form>
        <div class="links">
            <a href="#">Forgot Password?</a> | <a href="{{ url_for('index') }}">Back to Home</a>
        </div>
        <footer>
            &copy; 2024 Online Railway Reservation System. All Rights Reserved. Developed by Group X.
        </footer>
    </div>

</body>
</html>
