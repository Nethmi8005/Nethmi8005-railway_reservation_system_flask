<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Online Railway Reservation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>
        function validatePasswords() {
            var password = document.getElementById("password").value;
            var confirmPassword = document.getElementById("confirm-password").value;
            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return false;
            }
            return true;
        }
    </script>
</head>
<body>

    <div class="container">
        <h1>Register</h1>
        <form method="POST" onsubmit="return validatePasswords()">
            <label for="name">Name:</label>
            <input type="text" id="name" name="username" placeholder="Enter your full name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <label for="confirm-password">Confirm Password:</label>
            <input type="password" id="confirm-password" placeholder="Confirm your password" required>

            <button type="submit">Register</button>
        </form>
        <div class="links">
            <a href="{{ url_for('login') }}">Back to Login</a>
        </div>
        <footer>
            &copy; 2024 Online Railway Reservation System. All Rights Reserved. Developed by Group X.
        </footer>
    </div>

</body>
</html>
